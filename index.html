<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>İSO2 Pardus OS</title>
    <style>
        body { 
            background: #0d1117; color: white; margin: 0; font-family: sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: space-between;
            height: 100vh; overflow: hidden;
        }
        
        /* ASLANLI GİRİŞ EKRANI */
        #login-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #0d1117; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; z-index: 9999;
            transition: opacity 1s ease;
        }
        .lion-img { width: 250px; height: 250px; border-radius: 50%; border: 4px solid #ff9800; box-shadow: 0 0 30px #ff9800; }
        #unlock-btn { margin-top: 30px; background: #ff9800; border: none; padding: 15px 40px; border-radius: 20px; font-weight: bold; cursor: pointer; }

        /* ANA EKRAN */
        #saat { font-size: 2rem; color: #00f2fe; margin-top: 20px; }
        .menu { display: flex; gap: 20px; }
        .sys-btn { background: #2a3441; padding: 20px 40px; border-radius: 10px; color: white; text-decoration: none; border: 1px solid #444; }
        
        .taskbar { width: 100%; height: 60px; background: #090d16; display: flex; justify-content: center; gap: 40px; align-items: center; }
        .icon { font-size: 30px; cursor: pointer; }
        
        .fade-out { opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <img src="https://islambabacikk.github.io/iso2-sistem-/30518.png" class="lion-img" alt="Aslan">
        <button id="unlock-btn" onclick="document.getElementById('login-overlay').classList.add('fade-out')">Sistemi Başlat</button>
    </div>

    <div id="saat">00:00</div>
    <h1>İSO2</h1>
    <div class="menu">
        <a href="#" class="sys-btn">Windows</a>
        <a href="#" class="sys-btn">Android</a>
        <a href="#" class="sys-btn">İSO2</a>
    </div>

    <div class="taskbar">
        <span class="icon">🦊</span>
        <span class="icon">🌐</span>
        <span class="icon">✏️</span>
    </div>

    <script>
        function guncelSaat() {
            document.getElementById('saat').innerText = new Date().toLocaleTimeString('tr-TR', {hour: '2-digit', minute:'2-digit'});
        }
        setInterval(guncelSaat, 1000);
        guncelSaat();
    </script>
</body>
</html>
